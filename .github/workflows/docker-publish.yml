name: Docker

on:
  workflow_dispatch:
  push:
    branches: [main, dev, test]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          REF="${GITHUB_REF##*/}"
          SHA="${GITHUB_SHA::7}"
          TAGS="ghcr.io/zooai/exchange:${REF}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            TAGS="${TAGS},ghcr.io/zooai/exchange:latest"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/}"
            TAGS="ghcr.io/zooai/exchange:${VER},ghcr.io/zooai/exchange:latest"
          fi
          TAGS="${TAGS},ghcr.io/zooai/exchange:sha-${SHA}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=ghcr.io/zooai/exchange:cache
          cache-to: type=registry,ref=ghcr.io/zooai/exchange:cache,mode=max

  notify-universe:
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: self-hosted
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.UNIVERSE_PAT }}
          repository: zooai/universe
          event-type: image-published
          client-payload: |
            {
              "service": "exchange",
              "image": "ghcr.io/zooai/exchange",
              "tag": "${{ github.ref_name }}",
              "sha": "${{ github.sha }}"
            }
