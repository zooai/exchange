name: Docker

on:
  workflow_dispatch:
  push:
    branches: [main, dev, test]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/zooai/exchange
      # Our own ARC runners only — no GitHub-hosted.
      runner-amd64: hanzo-build-linux-amd64
      runner-arm64: hanzo-build-linux-arm64
    secrets: inherit

  notify-universe:
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: hanzo-build-linux-amd64
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.UNIVERSE_PAT }}
          repository: zooai/universe
          event-type: image-published
          client-payload: |
            {
              "service": "exchange",
              "image": "ghcr.io/zooai/exchange",
              "tag": "${{ github.ref_name }}",
              "sha": "${{ github.sha }}"
            }
